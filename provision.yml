---
- name: Provision OPNsense Firewall (GitOps)
  hosts: opnsense
  gather_facts: false

  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ firewall }}"
      api_key: "{{ api_key }}"
      api_secret: "{{ api_secret }}"
      ssl_verify: "{{ ssl_verify }}"

  tasks:
    - name: Load all gathered configuration from input folder
      delegate_to: localhost
      ansible.builtin.include_vars:
        dir: "input"

    # --- Networking Layer ---
    - name: Provision VLANs
      oxlorg.opnsense.interface_vlan:
        tag: "{{ item.tag }}"
        if: "{{ item.if }}"
        descr: "{{ item.descr | default('') }}"
        state: present
      loop: "{{ interface_vlan | default([]) }}"

    - name: Provision Gateways
      oxlorg.opnsense.gateway:
        name: "{{ item.name }}"
        interface: "{{ item.interface }}"
        gateway: "{{ item.gateway }}"
        ipprotocol: "{{ item.ipprotocol }}"
        descr: "{{ item.descr | default('') }}"
        state: present
      loop: "{{ gateway | default([]) }}"

    # --- Firewall Layer ---
    - name: Provision Aliases
      oxlorg.opnsense.alias:
        name: "{{ item.name }}"
        type: "{{ item.type }}"
        content: "{{ item.content }}"
        description: "{{ item.description | default('') }}"
        state: present
      loop: "{{ alias | default([]) }}"

    - name: Provision NAT Source Rules
      oxlorg.opnsense.nat_source:
        interface: "{{ item.interface }}"
        protocol: "{{ item.protocol | default('any') }}"
        src: "{{ item.src }}"
        dst: "{{ item.dst }}"
        description: "{{ item.description | default('') }}"
        state: present
      loop: "{{ nat_source | default([]) }}"

    - name: Provision Firewall Rules
      oxlorg.opnsense.rule:
        interface: "{{ item.interface }}"
        direction: "{{ item.direction }}"
        ipprotocol: "{{ item.ipprotocol }}"
        protocol: "{{ item.protocol }}"
        src: "{{ item.src }}"
        dst: "{{ item.dst }}"
        dst_port: "{{ item.dst_port | default('') }}"
        description: "{{ item.description | default('') }}"
        action: "{{ item.action }}"
        state: present
      loop: "{{ rule | default([]) }}"

    # --- Services Layer ---
    - name: Provision DHCP Subnets
      oxlorg.opnsense.dhcp_subnet:
        interface: "{{ item.interface }}"
        range_from: "{{ item.range_from }}"
        range_to: "{{ item.range_to }}"
        gateway: "{{ item.gateway | default(omit) }}"
        description: "{{ item.description | default('') }}"
        state: present
      loop: "{{ dhcp_subnet | default([]) }}"

    - name: Provision Unbound Hosts
      oxlorg.opnsense.unbound_host:
        host: "{{ item.host }}"
        domain: "{{ item.domain }}"
        server: "{{ item.server }}"
        description: "{{ item.description | default('') }}"
        state: present
      loop: "{{ unbound_host | default([]) }}"

    - name: Provision Cron Jobs
      oxlorg.opnsense.cron:
        description: "{{ item.description }}"
        command: "{{ item.command }}"
        parameters: "{{ item.parameters | default('') }}"
        minute: "{{ item.minute | default('*') }}"
        hour: "{{ item.hour | default('*') }}"
        day: "{{ item.day | default('*') }}"
        month: "{{ item.month | default('*') }}"
        weekday: "{{ item.weekday | default('*') }}"
        enabled: "{{ item.enabled | default(true) }}"
        state: present
      loop: "{{ cron | default([]) }}"

    # --- VPN Layer ---
    - name: Provision WireGuard Servers
      oxlorg.opnsense.wireguard_server:
        name: "{{ item.name }}"
        pubkey: "{{ item.pubkey }}"
        port: "{{ item.port | default(51820) }}"
        enabled: "{{ item.enabled | default(true) }}"
        state: present
      loop: "{{ wireguard_server | default([]) }}"

    - name: Apply all changes (Reload)
      oxlorg.opnsense.reload:
        target: "{{ item }}"
      loop:
        - filter
        - dhcp
        - unbound
        - wireguard
      ignore_errors: true
