---
- name: Gather OPNsense Configuration Facts
  hosts: opnsense
  gather_facts: false

  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ firewall }}"
      api_key: "{{ api_key }}"
      api_secret: "{{ api_secret }}"
      ssl_verify: "{{ ssl_verify }}"

  vars:
    # DEFINITIVE EXHAUSTIVE list of resource types supported by oxlorg.opnsense.list
    resource_targets:
      # --- Firewall & NAT ---
      - alias
      - rule
      - rule_interface_group
      - nat_source
      - nat_one_to_one
      - traffic_shaper_pipe
      - traffic_shaper_queue
      - traffic_shaper_rule

      # --- Networking & Interfaces ---
      - interface_vlan
      - interface_vip
      - interface_lagg
      - interface_bridge
      - interface_gif
      - interface_gre
      - interface_loopback
      - interface_vxlan
      - gateway
      - gateway_group
      - static_route
      - neighbor

      # --- VPN ---
      - wireguard_client
      - wireguard_server
      - ipsec_connection
      - ipsec_child
      - ipsec_psk
      - ipsec_auth_local
      - ipsec_auth_remote
      - openvpn_server
      - openvpn_client
      - openvpn_client_override

      # --- Services (Core) ---
      - dhcp_subnet
      - dhcp_reservation
      - dhcp_controlagent
      - dhcp_general
      - dhcrelay_destination
      - dhcrelay_relay
      - unbound_host
      - unbound_alias
      - unbound_forward
      - unbound_dot
      - unbound_dnsbl
      - dnsmasq_host
      - dnsmasq_domain
      - dnsmasq_range
      - dnsmasq_tag
      - cron

      # --- System & Access ---
      - user
      - group
      - privilege
      - syslog

      # --- Monitoring ---
      - monit_service
      - monit_test
      - monit_alert
      - ids_rule
      - ids_user_rule
      - ids_policy
      - ids_policy_rule

      # --- Plugins & Dynamic Routing ---
      - haproxy_acl
      - haproxy_action
      - haproxy_cpu
      - haproxy_errorfile
      - haproxy_fcgi
      - haproxy_group
      - haproxy_lua
      - haproxy_maintenance
      - haproxy_user
      - bind_domain
      - bind_record
      - bind_acl
      - bind_blocklist
      - frr_general
      - frr_bfd_general
      - frr_bfd_neighbor
      - frr_bgp_general
      - frr_bgp_neighbor
      - frr_bgp_as_path
      - frr_bgp_community_list
      - frr_bgp_prefix_list
      - frr_bgp_peer_group
      - frr_bgp_route_map
      - frr_ospf_general
      - frr_ospf_interface
      - frr_ospf_network
      - frr_ospf_prefix_list
      - frr_ospf_route_map
      - frr_ospf3_general
      - frr_ospf3_interface
      - frr_ospf3_network
      - frr_ospf3_prefix_list
      - frr_ospf3_route_map
      - frr_rip
      - acme_account
      - acme_certificate
      - nginx_upstream_server
      - hasync_general
      - hasync_service

    output_dir: "input"

  tasks:
    - name: Ensure input directory exists
      delegate_to: localhost
      ansible.builtin.file:
        path: "{{ playbook_dir }}/{{ output_dir }}"
        state: directory

    - name: Gather facts for all OPNsense resources
      oxlorg.opnsense.list:
        target: "{{ item }}"
      loop: "{{ resource_targets }}"
      register: gathered_facts
      ignore_errors: true # Some plugins might not be installed

    - name: Save gathered facts to YAML
      delegate_to: localhost
      ansible.builtin.copy:
        content: "{{ {item.item: item[item.item]} | to_nice_yaml }}"
        dest: "{{ playbook_dir }}/{{ output_dir }}/{{ item.item }}.yml"
      loop: "{{ gathered_facts.results }}"
      when:
        - item[item.item] is defined
        - item[item.item] | length > 0
        - item.failed is not defined or not item.failed
