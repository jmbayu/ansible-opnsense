---
- name: Gather OPNsense Configuration Facts
  hosts: opnsense
  # We disable standard fact gathering because OPNsense management is API-driven.
  # Standard facts require SSH and Python on the target, which are not needed here.
  gather_facts: false

  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ firewall }}"
      api_key: "{{ api_key }}"
      api_secret: "{{ api_secret }}"
      ssl_verify: "{{ ssl_verify }}"

  vars:
    # List of resource types to extract from the firewall
    # These match the 'target' parameter of the oxlorg.opnsense.list module.
    # Note: This is not an exhaustive list but covers the most common resources.
    resource_targets:
      # Base & Firewall
      - alias
      - rule
      - rule_interface_group
      - gateway
      - gateway_group
      - nat_source
      - nat_one_to_one

      # Interfaces & Networking
      - interface_vlan
      - interface_vip
      - interface_lagg
      - interface_bridge
      - neighbor
      - static_route

      # VPN
      - wireguard_client
      - wireguard_server
      - ipsec_connection
      - openvpn_server
      - openvpn_client

      # Services
      - dhcp_subnet
      - dhcp_reservation
      - unbound_host
      - unbound_alias
      - unbound_forward
      - bind_domain
      - bind_record
      - dnsmasq_host
      - cron

      # Monitoring & System
      - monit_service
      - monit_test
      - syslog
      - user
      - group

    # Destination directory for the gathered YAML files
    output_dir: "../input"

  tasks:
    - name: Ensure input directory exists locally
      delegate_to: localhost
      ansible.builtin.file:
        path: "{{ playbook_dir }}/{{ output_dir }}"
        state: directory
        mode: '0755'

    - name: Gather facts for each resource type
      oxlorg.opnsense.list:
        target: "{{ item }}"
      loop: "{{ resource_targets }}"
      register: gathered_facts

    - name: Save gathered facts to YAML files
      delegate_to: localhost
      ansible.builtin.copy:
        # Note: Saving the list directly. include_vars will load it
        # with the filename as the top-level key.
        content: "{{ item[item.item] | to_nice_yaml }}"
        dest: "{{ playbook_dir }}/{{ output_dir }}/{{ item.item }}.yml"
        mode: '0644'
      loop: "{{ gathered_facts.results }}"
      when: item[item.item] is defined and item[item.item] | length > 0

    - name: Summary
      delegate_to: localhost
      ansible.builtin.debug:
        msg: "Facts gathered and saved to {{ output_dir }}/ for: {{ resource_targets | join(', ') }}"
