---
- name: Provision OPNsense Firewall
  hosts: opnsense
  # We disable standard fact gathering because OPNsense management is API-driven.
  # Standard facts require SSH and Python on the target, which are not needed here.
  gather_facts: false

  # Setting defaults for all modules in the oxlorg.opnsense collection
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ firewall }}"
      api_key: "{{ api_key }}"
      api_secret: "{{ api_secret }}"
      ssl_verify: "{{ ssl_verify }}"

  tasks:
    - name: Create an Alias for Internal Servers
      oxlorg.opnsense.alias:
        name: "internal_servers"
        type: "host"
        content:
          - "10.0.0.10"
          - "10.0.0.11"
        description: "List of internal application servers"
        state: present

    - name: Create a Firewall Rule to allow HTTPS to Internal Servers
      oxlorg.opnsense.rule:
        interface: "lan"
        direction: "in"
        ipprotocol: "inet"
        protocol: "TCP"
        src: "any"
        dst: "internal_servers"
        dst_port: "443"
        description: "Allow HTTPS to internal servers"
        action: "pass"
        state: present

    - name: Apply changes (Reload)
      oxlorg.opnsense.reload:
        target: "filter"
