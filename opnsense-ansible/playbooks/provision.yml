---
- name: Provision OPNsense Firewall
  hosts: opnsense
  gather_facts: false

  # Setting defaults for all modules in the oxlorg.opnsense collection
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ firewall }}"
      api_key: "{{ api_key }}"
      api_secret: "{{ api_secret }}"
      ssl_verify: "{{ ssl_verify }}"

  tasks:
    - name: Load gathered configuration
      delegate_to: localhost
      ansible.builtin.include_vars:
        dir: "../input"
        name: gathered_config

    - name: Provision Aliases from gathered data
      oxlorg.opnsense.alias:
        name: "{{ item.name }}"
        type: "{{ item.type }}"
        content: "{{ item.content }}"
        description: "{{ item.description | default('') }}"
        state: present
      loop: "{{ gathered_config.alias | default([]) }}"

    - name: Provision Firewall Rules from gathered data
      oxlorg.opnsense.rule:
        interface: "{{ item.interface }}"
        direction: "{{ item.direction }}"
        ipprotocol: "{{ item.ipprotocol }}"
        protocol: "{{ item.protocol }}"
        src: "{{ item.src }}"
        dst: "{{ item.dst }}"
        dst_port: "{{ item.dst_port | default('') }}"
        description: "{{ item.description | default('') }}"
        action: "{{ item.action }}"
        state: present
      loop: "{{ gathered_config.rule | default([]) }}"

    - name: Apply changes (Reload)
      oxlorg.opnsense.reload:
        target: "filter"
