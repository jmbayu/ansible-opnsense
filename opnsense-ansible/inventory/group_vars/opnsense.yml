---
# Connection settings for OPNsense API
# These can be defined here or passed via module_defaults in the playbook

# The URL of the OPNsense firewall (e.g., https://192.168.1.1)
firewall: "https://{{ ansible_host }}"

# API Credentials - It is recommended to use Ansible Vault for these
api_key: "YOUR_API_KEY"
api_secret: "YOUR_API_SECRET"

# SSL Verification
ssl_verify: false

# OPNsense modules typically run on the control node and communicate via API
ansible_connection: local
